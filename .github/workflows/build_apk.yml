name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate fresh Android files in a separate folder
        run: flutter create --platforms=android --org com.aisongapp --project-name ai_song_app /tmp/scaffold

      - name: Replace only the android folder (keep our app code untouched)
        run: |
          rm -rf android
          cp -r /tmp/scaffold/android ./android

      - name: Restore required permissions in AndroidManifest.xml
        run: |
          sed -i '/<manifest xmlns:android/a\
              <uses-permission android:name="android.permission.CAMERA" />\
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />\
              <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />\
              <uses-feature android:name="android.hardware.camera" android:required="false" />' android/app/src/main/AndroidManifest.xml
          sed -i 's/<application/<application android:requestLegacyExternalStorage="true"/' android/app/src/main/AndroidManifest.xml

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
