name: ai_song_app
description: Personalized AI-style song generator (on-device, offline)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_tts: ^4.0.2
  audioplayers: ^6.0.0
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  camera: ^0.10.6
  google_mlkit_face_detection: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
